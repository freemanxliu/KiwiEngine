; ============================================================
; KiwiEngine - Default Engine Configuration
; ============================================================
;
; This file is loaded automatically at engine startup.
; Place it in Config/DefaultEngine.ini relative to the project root.
;
; Format:
;   [Section]
;   Key=Value
;   ; Comment lines start with ; or #
;

; ---- RenderDoc Integration ----
[RenderDoc]
; Path to renderdoc.dll.
; If empty or invalid, the engine will auto-detect from common install paths.
; Examples:
;   DllPath=C:\Program Files\RenderDoc\renderdoc.dll
;   DllPath=D:\Tools\RenderDoc\renderdoc.dll
DllPath=C:\Program Files\RenderDoc\renderdoc.dll

; Enable/disable RenderDoc integration (true/false)
Enabled=true

; Default capture file path template (relative to exe)
CapturePathTemplate=captures/kiwi_frame

; ---- Rendering ----
[Rendering]
; Default RHI backend: DX11 or DX12
DefaultRHI=DX11

; Enable GPU validation layer
EnableValidation=true

; VSync (true/false)
VSync=true

; ---- Window ----
[Window]
; Default window dimensions
Width=1280
Height=720
Title=Kiwi Engine - Scene Editor

; ---- Debug ----
[Debug]
; Show console output
Verbose=true
